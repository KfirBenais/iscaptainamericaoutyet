<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/3d-printer-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#667eea" />
    <meta
      name="description"
      content="Benais 3D Prints - Quality 3D printed products at great prices!"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.svg" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Benais 3D Prints - Quality Products</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!-- Hidden Netlify form — required for Netlify to detect the form at build time -->
    <form
      name="print-request"
      netlify
      netlify-honeypot="bot-field"
      hidden
    >
      <input type="text"   name="name" />
      <input type="email"  name="email" />
      <input type="tel"    name="phone" />
      <input type="text"   name="colors" />
      <input type="number" name="quantity" />
      <textarea            name="notes"></textarea>
      <input type="url"    name="file-url" />
      <input type="text"   name="file-name" />
    </form>
  </body>
</html>
